<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Demo | 数字员工控制台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="layout">
    <div class="workspace-grid">
      <div class="col-left">
        <section class="panel token-panel">
          <div class="panel-header flex-between">
            <h2>Token 仪表盘</h2>
            <button id="forceFlushBtn" class="btn btn-sm text-danger" type="button">手动刷盘</button>
          </div>
          <div class="meter-wrapper">
            <div class="meter">
              <div id="residentBar" class="meter-bar bg-green"></div>
              <div id="dialogueBar" class="meter-bar bg-yellow"></div>
              <div id="bufferBar" class="meter-bar bg-blue"></div>
            </div>
            <div class="meter-legend">
              <span><i class="dot bg-green"></i>常驻区</span>
              <span><i class="dot bg-yellow"></i>对话区</span>
              <span><i class="dot bg-blue"></i>缓冲区</span>
            </div>
          </div>
          <div id="tokenSummary" class="token-summary">正在加载状态...</div>
        </section>

        <section class="panel chat-panel fill-height">
          <div class="panel-header flex-between">
            <h2>对话区</h2>
            <div class="toolbar">
              <select id="employeeSelect" class="input-sm"></select>
              <button id="newEmployeeBtn" class="btn btn-sm" type="button">新建员工</button>
              <button id="resetEmployeeBtn" class="btn btn-sm text-danger" type="button">重置员工</button>
              <button id="deleteEmployeeBtn" class="btn btn-sm text-danger" type="button">删除员工</button>
              <button id="reloadEmployeeBtn" class="btn btn-sm" type="button">刷新员工</button>
            </div>
          </div>
          <div id="chatLog" class="chat-log" aria-live="polite"></div>
          <form id="chatForm" class="chat-form">
            <textarea id="messageInput" rows="2" placeholder="输入消息 (Enter 发送, Shift+Enter 换行)..."></textarea>
            <button type="submit" class="btn btn-primary send-btn">发送</button>
          </form>
        </section>
      </div>

      <div class="col-right">
        <section class="panel user-panel">
          <div class="panel-header">
            <h2>用户管理</h2>
          </div>
          <div class="user-actions">
            <div class="input-group">
              <label for="userIdInput">用户 ID</label>
              <input id="userIdInput" type="text" placeholder="字母/数字/._-">
            </div>
            <div class="btn-group">
              <button id="switchUserBtn" class="btn" type="button">应用用户</button>
              <button id="openSettingsBtn" class="btn btn-outline" type="button">用户配置</button>
            </div>
          </div>
        </section>

        <section class="panel file-panel fill-height">
          <div class="panel-header flex-between">
            <h2>用户数据</h2>
            <div class="toolbar">
              <button id="uploadBrandLibraryBtn" class="btn btn-sm" type="button">上传素材</button>
              <button id="reloadFilesBtn" class="btn btn-sm" type="button">刷新目录</button>
            </div>
            <input id="uploadBrandLibraryInput" type="file" multiple hidden>
          </div>
          <div class="memory-workspace">
            <aside class="memory-sidebar">
              <div class="sidebar-header">目录</div>
              <div id="directoryTree" class="directory-tree"></div>
            </aside>
            <main class="memory-editor">
              <div class="editor-header">
                <span id="activeFileName" class="font-mono text-sm">未选择文件</span>
                <div class="editor-actions">
                  <button id="deleteFileBtn" class="btn btn-sm text-danger" type="button">删除文件</button>
                  <button id="saveFileBtn" class="btn btn-primary btn-sm" type="button">保存修改</button>
                </div>
              </div>
              <div id="fileImagePreview" class="file-image-preview" hidden>
                <img id="fileImagePreviewImg" alt="">
                <div id="fileImagePreviewPath" class="file-image-caption"></div>
              </div>
              <textarea id="fileContent" spellcheck="false" placeholder="请选择文件并编辑内容..."></textarea>
            </main>
          </div>
        </section>
      </div>
    </div>
  </main>

  <dialog id="settingsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>用户配置</h2>
        <button id="closeSettingsBtn" class="btn btn-sm" type="button">关闭</button>
      </div>
      <div class="modal-body">
        <p class="text-muted text-sm mb-4">设置按用户维度写入，与具体数字员工无关。</p>
        <div class="grid-form">
          <label><span>Model Name</span><input id="model" type="text" placeholder="agent-advoo"></label>
          <label><span>API Key</span><input id="apiKey" type="password" placeholder="sk-..."></label>
          <label class="full-width"><span>Base URL</span><input id="baseUrl" type="text"></label>
          <label><span>Total Token Limit</span><input id="totalTokenLimit" type="number" step="1000"></label>
          <label>
            <span>Tokenizer</span>
            <select id="tokenizerModel" class="input-sm">
              <option value="kimi-k2.5">kimi-k2.5</option>
            </select>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button id="saveConfigBtn" class="btn btn-primary" type="button">保存配置</button>
      </div>
    </div>
  </dialog>

  <template id="chatItemTemplate">
    <div class="chat-item">
      <div class="chat-meta text-xs text-muted mb-1"></div>
      <div class="chat-body"></div>
    </div>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
